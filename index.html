<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投放数据统计系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6;min-height:100vh}
input,select,button,table{font-family:inherit}

/* ===== VARIABLES ===== */
:root{
  --primary:#4361ee;--primary-dark:#3a56d4;--primary-light:#eef1ff;--primary-bg:#f0f3ff;
  --success:#06d6a0;--success-dark:#05c090;--success-light:#e6faf4;
  --warning:#ffd166;--warning-dark:#f0c040;
  --danger:#ef476f;--danger-light:#fef0f3;
  --info:#118ab2;
  --bg:#f0f2f5;--card:#ffffff;--card-hover:#fafbfc;
  --text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;
  --border:#e5e7eb;--border-light:#f3f4f6;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 6px 16px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --sidebar-w:260px;
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}

/* ===== LOGIN ===== */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#4361ee 0%,#7209b7 50%,#f72585 100%);padding:20px}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:440px;max-width:100%;box-shadow:0 25px 60px rgba(0,0,0,.15)}
.login-box h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;color:var(--text)}
.login-box>.p{color:var(--text2);text-align:center;font-size:13px;margin-bottom:32px}
.login-hint{text-align:center;margin-top:20px;font-size:12px;color:var(--text3);line-height:1.8}
.login-hint code{background:var(--primary-light);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--primary)}

/* ===== FORM ELEMENTS ===== */
.fg{margin-bottom:20px}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:.02em}
.fg input,.fg select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;background:#fff;transition:var(--transition);color:var(--text)}
.fg input:focus,.fg select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(67,97,238,.12)}
.fg input::placeholder{color:var(--text3)}
.fg .help-text{font-size:12px;color:var(--text3);margin-top:5px}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 22px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;line-height:1}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(67,97,238,.3)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:var(--success-dark)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#d63d60}
.btn-warning{background:var(--warning);color:var(--text)}
.btn-ghost{background:var(--bg);color:var(--text2)}
.btn-ghost:hover{background:var(--border)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:var(--radius-xs)}
.btn-block{width:100%}
.hidden{display:none!important}

/* ===== APP LAYOUT ===== */
.app-layout{display:flex;min-height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10}
.sidebar-hd{padding:24px 22px 20px;border-bottom:1px solid var(--border-light)}
.sidebar-hd-inner{display:flex;align-items:center;gap:12px}
.sidebar-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#7209b7);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.sidebar-hd h2{font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
.sidebar-hd .role-badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600;margin-top:4px}
.role-admin{background:var(--primary-light);color:var(--primary)}
.role-kefu{background:var(--success-light);color:#047857}
.role-shangmen{background:#fff7ed;color:#b45309}

/* Nav */
.nav-menu{flex:1;padding:16px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:var(--radius-sm);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text2);transition:var(--transition);margin-bottom:4px;user-select:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item .ni{font-size:17px;width:22px;text-align:center;flex-shrink:0}

/* Sidebar footer */
.sidebar-ft{padding:16px 18px;border-top:1px solid var(--border-light)}
.user-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#7209b7);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.2}
.user-role{font-size:11.5px;color:var(--text3)}

/* ===== MAIN CONTENT ===== */
.main-content{flex:1;margin-left:var(--sidebar-w);padding:28px 32px;min-height:100vh}
.page-hd{margin-bottom:28px}
.page-hd h1{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.page-hd p{font-size:13px;color:var(--text2)}

/* ===== CARDS ===== */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:24px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-size:15px;font-weight:700;color:var(--text)}
.card-sub{font-size:12px;color:var(--text3);margin-top:3px}

/* ===== KPI GRID ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:16px;margin-bottom:28px}
.kpi-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;position:relative;overflow:hidden;transition:var(--transition)}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.blue::after{background:var(--primary)}.kpi-card.green::after{background:var(--success)}
.kpi-card.orange::after{background:var(--warning)}.kpi-card.red::after{background:var(--danger)}
.kpi-card.cyan::after{background:var(--info)}
.kpi-label{font-size:12.5px;color:var(--text2);margin-bottom:10px;font-weight:500}
.kpi-value{font-size:26px;font-weight:800;color:var(--text);margin-bottom:8px;letter-spacing:-.02em}
.kpi-change{font-size:11.5px;color:var(--text3);display:flex;align-items:center;gap:3px}
.kpi-change.up{color:var(--success)}.kpi-change.down{color:var(--danger)}

/* ===== TABLES ===== */
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:600px;border-radius:var(--radius-sm)}
table{width:100%;border-collapse:collapse;font-size:13px;line-height:1.5}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border-light);white-space:nowrap}
th{background:#f9fafb;font-weight:600;color:var(--text2);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0;z-index:1}
tr:hover td{background:var(--card-hover)}
.total-row td{background:var(--primary-light)!important;font-weight:700!important;border-top:2px solid var(--primary)!important;color:var(--primary-dark)}

/* ===== TAGS ===== */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;line-height:1.4}
.tag-blue{background:var(--primary-light);color:var(--primary)}
.tag-green{background:var(--success-light);color:#047857}
.tag-orange{background:#fff7ed;color:#b45309}
.tag-red{background:var(--danger-light);color:var(--danger)}
.tag-gray{background:var(--bg);color:var(--text2)}

/* ===== FORMS ===== */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.form-section{margin-bottom:28px}
.form-section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.input-group{position:relative}
.input-group .suffix{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}

/* ===== CHARTS ===== */
.chart-container{position:relative;height:300px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:1100px){.chart-grid{grid-template-columns:1fr}}

/* ===== FILTER BAR ===== */
.filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.filter-bar label{font-size:13px;font-weight:500;color:var(--text2)}
.filter-bar select{padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;background:#fff}

/* ===== FUNNEL ===== */
.funnel-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 12px}
.funnel-step{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-radius:var(--radius-sm);color:#fff;font-weight:600;position:relative;transition:var(--transition)}
.funnel-step:hover{transform:scale(1.02)}
.funnel-step .fn{font-size:13px}.funnel-step .fv{font-size:20px;font-weight:800}
.funnel-step .fr{position:absolute;right:-86px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text);background:#fff;padding:4px 12px;border-radius:var(--radius-xs);box-shadow:var(--shadow);font-weight:700;white-space:nowrap}
.funnel-arrow{color:var(--text3);font-size:16px}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{background:#fff;padding:14px 22px;border-radius:var(--radius-sm);box-shadow:0 12px 32px rgba(0,0,0,.12);display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:500;animation:toastIn .35s cubic-bezier(.4,0,.2,1);border-left:4px solid var(--success)}
.toast.error{border-left-color:var(--danger)}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s}
.modal{background:#fff;border-radius:var(--radius);width:480px;max-width:92%;max-height:85vh;overflow:auto;animation:modalIn .3s cubic-bezier(.4,0,.2,1)}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center}
.modal-hd h3{font-size:16px;font-weight:700}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;padding:4px;transition:var(--transition)}
.close-btn:hover{color:var(--text)}
.modal-bd{padding:24px}
.modal-ft{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:10px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ===== MOBILE NAV ===== */
.mobile-nav{display:none}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{display:none}
  .main-content{margin-left:0;padding:16px;padding-bottom:80px}
  .app-layout{flex-direction:column}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}
  .kpi-card{padding:14px 10px}
  .kpi-value{font-size:20px}
  .kpi-label{font-size:11px}
  .chart-grid{grid-template-columns:1fr;gap:14px}
  .form-grid{grid-template-columns:1fr}
  .form-grid input,.form-grid select{padding:14px 12px;font-size:16px}
  .page-hd h1{font-size:18px}
  .page-hd p{font-size:13px}
  .card{padding:16px}
  .card-hd{flex-direction:column;align-items:flex-start;gap:8px}
  .filter-bar{flex-direction:column;align-items:stretch;gap:8px}
  .filter-bar label{font-size:13px}
  .filter-bar select,.filter-bar input{width:100%;padding:12px;font-size:15px}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .table-wrap table{min-width:900px}
  .login-box{padding:28px 20px;width:92vw}
  .login-box h1{font-size:20px}
  .btn{padding:12px 16px;font-size:15px}
  .btn-sm{padding:8px 12px;font-size:13px}

  /* Mobile bottom nav */
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid var(--border-light);z-index:100;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom)}
  .mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0;color:var(--text3);font-size:10px;text-decoration:none;cursor:pointer;border:none;background:none;transition:color .2s}
  .mobile-nav-item .mni{font-size:20px;line-height:1}
  .mobile-nav-item.active{color:var(--primary);font-weight:600}
  .mobile-nav-item:hover{color:var(--primary)}

  /* Person cards mobile */
  .person-card .person-stats{grid-template-columns:repeat(2,1fr)}

  /* Modal mobile */
  .modal-content{width:92vw;padding:20px}
}
</style>
</head>

/* ===== CALC ===== */
function calc(r){const a=+r.adSpend||0,p=+r.privateMsg||0,w=+r.wechatAdd||0,pu=+r.pushOrder||0,v=+r.visitSuccess||0,d=+r.dealCount||0;
return{...r,pmc:p>0?+(a/p).toFixed(2):0,wac:w>0?+(a/w).toFixed(2):0,poc:pu>0?+(a/pu).toFixed(2):0,dc:d>0?+(a/d).toFixed(2):0,war:p>0?+(w/p).toFixed(4):0,por:w>0?+(pu/w).toFixed(4):0,vdr:v>0?+(d/v).toFixed(4):0};}
function getF(m){let r=D.records.map(calc);if(m)r=r.filter(x=>x.month===m);return r.sort((a,b)=>b.date.localeCompare(a.date));}
function agg(recs){const s=recs.reduce((a,r)=>{a.a+=+r.adSpend||0;a.p+=+r.privateMsg||0;a.w+=+r.wechatAdd||0;a.pu+=+r.pushOrder||0;a.v+=+r.visitSuccess||0;a.d+=+r.dealCount||0;return a;},{a:0,p:0,w:0,pu:0,v:0,d:0});
return calc({adSpend:s.a,privateMsg:s.p,wechatAdd:s.w,pushOrder:s.pu,visitSuccess:s.v,dealCount:s.d,date:'汇总',month:''});}
function getM(){const g={};D.records.forEach(r=>{if(!g[r.month])g[r.month]=[];g[r.month].push(r);});return Object.keys(g).sort().map(m=>({...agg(g[m]),month:m}));}
function tRow(cells){return '<tr class="total-row">'+cells+'</tr>';}

function kpi(color,label,value,pct,name,inv){

}

    D.users.map(u=>'<tr><td><strong>'+u.name+'</strong></td><td><code>'+u.account+'</code></td><td><code>'+u.password+'</code></td><td><span class="tag tag-'+(u.role==='kefu'?'blue':u.role==='shangmen'?'orange':'red')+'">'+rn[u.role]+'</span></td><td><button class="btn btn-sm btn-ghost" onclick="editU(\''+u.id+'\')">编辑</button>'+(u.id!=='u_admin'?' <button class="btn btn-sm btn-danger" onclick="delU(\''+u.id+'\')">删除</button>':'')+'</td></tr>').join('')+
    '</tbody></table></div></div>'+
    '<div class="card"><div class="card-hd"><div class="card-title">客服人员名单（用于数据归属）</div><button class="btn btn-sm btn-primary" onclick="showAddKF()">+ 添加客服</button></div><div class="table-wrap"><table>'+
    '<thead><tr><th>姓名</th><th>操作</th></tr></thead><tbody>'+
    D.kfStaff.map((n,i)=>'<tr><td><span class="tag tag-blue">'+n+'</span></td><td><button class="btn btn-sm btn-danger" onclick="delKF('+i+')">删除</button></td></tr>').join('')+
    '</tbody></table></div></div>'+
    '<div class="card"><div class="card-hd"><div class="card-title">上门人员名单（用于数据归属）</div><button class="btn btn-sm btn-primary" onclick="showAddSM()">+ 添加上门</button></div><div class="table-wrap"><table>'+
    '<thead><tr><th>姓名</th><th>操作</th></tr></thead><tbody>'+
    D.smStaff.map((n,i)=>'<tr><td><span class="tag tag-orange">'+n+'</span></td><td><button class="btn btn-sm btn-danger" onclick="delSM('+i+')">删除</button></td></tr>').join('')+
    '</tbody></table></div></div>';
}
function showAddU(){document.getElementById('modalContainer').innerHTML='<div class="modal-bg" onclick="closeM()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-hd"><h3>添加账号</h3><button class="close-btn" onclick="closeM()">&times;</button></div><div class="modal-bd"><div class="fg"><label>姓名</label><input id="nu_n"></div><div class="fg"><label>登录账号</label><input id="nu_a"></div><div class="fg"><label>登录密码</label><input id="nu_p"></div><div class="fg"><label>角色</label><select id="nu_r"><option value="kefu">客服人员</option><option value="shangmen">上门人员</option></select></div></div><div class="modal-ft"><button class="btn btn-ghost" onclick="closeM()">取消</button><button class="btn btn-primary" onclick="saveNU()">保存</button></div></div></div>';}
function saveNU(){const n=document.getElementById('nu_n').value.trim(),a=document.getElementById('nu_a').value.trim(),p=document.getElementById('nu_p').value.trim(),r=document.getElementById('nu_r').value;if(!n||!a||!p){toast('请填写完整','e');return;}if(D.users.find(u=>u.account===a)){toast('账号已存在','e');return;}D.users.push({id:'u_'+Date.now(),account:a,password:p,name:n,role:r});save();closeM();toast('账号添加成功');rUsers(document.getElementById('mainContent'));}
function editU(id){const u=D.users.find(x=>x.id===id);if(!u)return;document.getElementById('modalContainer').innerHTML='<div class="modal-bg" onclick="closeM()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-hd"><h3>编辑账号</h3><button class="close-btn" onclick="closeM()">&times;</button></div><div class="modal-bd"><div class="fg"><label>姓名</label><input id="eu_n" value="'+u.name+'"></div><div class="fg"><label>登录账号</label><input id="eu_a" value="'+u.account+'"></div><div class="fg"><label>登录密码</label><input id="eu_p" value="'+u.password+'"></div><div class="fg"><label>角色</label><select id="eu_r"><option value="admin"'+(u.role==='admin'?' selected':'')+'>管理员</option><option value="kefu"'+(u.role==='kefu'?' selected':'')+'>客服人员</option><option value="shangmen"'+(u.role==='shangmen'?' selected':'')+'>上门人员</option></select></div></div><div class="modal-ft"><button class="btn btn-ghost" onclick="closeM()">取消</button><button class="btn btn-primary" onclick="saveEU(\''+id+'\')">保存</button></div></div></div>';}
function saveEU(id){const u=D.users.find(x=>x.id===id);if(!u)return;u.name=document.getElementById('eu_n').value.trim();u.account=document.getElementById('eu_a').value.trim();u.password=document.getElementById('eu_p').value.trim();u.role=document.getElementById('eu_r').value;if(!u.name||!u.account||!u.password){toast('请填写完整','e');return;}save();closeM();toast('账号已更新');rUsers(document.getElementById('mainContent'));}
function delU(id){showM('确认删除','<p>确定要删除此账号吗？</p>',()=>{D.users=D.users.filter(u=>u.id!==id);save();closeM();toast('账号已删除');rUsers(document.getElementById('mainContent'));},closeM);}
function showAddKF(){const n=prompt('请输入客服姓名：');if(n&&n.trim()){D.kfStaff.push(n.trim());save();go('users',document.querySelector('.nav-item.active'));toast('客服已添加');}}
function delKF(i){if(confirm('确定删除该客服人员吗？')){D.kfStaff.splice(i,1);save();go('users',document.querySelector('.nav-item.active'));toast('客服已删除');}}
function showAddSM(){const n=prompt('请输入上门人员姓名：');if(n&&n.trim()){D.smStaff.push(n.trim());save();go('users',document.querySelector('.nav-item.active'));toast('上门人员已添加');}}
function delSM(i){if(confirm('确定删除该上门人员吗？')){D.smStaff.splice(i,1);save();go('users',document.querySelector('.nav-item.active'));toast('上门人员已删除');}}

/* ===== KEFU INPUT ===== */
function rKI(c){const opts=D.kfStaff.map(n=>'<option value="'+n+'"'+(n===D.cur?' selected':'')+'>'+n+'</option>').join('');c.innerHTML='<div class="page-hd"><h1>录入客服数据</h1><p>请填写当天的投放和客服转化数据</p></div><div class="card" style="max-width:680px"><div class="form-section"><div class="form-section-title">&#x1F4C5; 基本信息</div><div class="form-grid"><div class="fg"><label>日期</label><input type="date" id="kD" value="'+new Date().toISOString().split('T')[0]+'"></div><div class="fg"><label>负责客服</label><select id="kU">'+opts+'</select></div></div></div><div class="form-section"><div class="form-section-title">&#x1F4CA; 投放数据</div><div class="form-grid"><div class="fg"><label>投放消耗（元）</label><div class="input-group"><input type="number" id="kA" placeholder="0.00" step="0.01"><span class="suffix">元</span></div></div><div class="fg"><label>私信转化（人）</label><input type="number" id="kP" placeholder="0"></div><div class="fg"><label>加微数量（人）</label><input type="number" id="kW" placeholder="0"></div><div class="fg"><label>推单数量（单）</label><input type="number" id="kO" placeholder="0"></div></div></div><div style="display:flex;gap:12px;margin-top:4px"><button class="btn btn-primary" onclick="subK()">&#x1F4BE; 保存数据</button><button class="btn btn-ghost" onclick="document.getElementById(\'kA\').value=\'\';document.getElementById(\'kP\').value=\'\';document.getElementById(\'kW\').value=\'\';document.getElementById(\'kO\').value=\'\'">重置</button></div></div>';}
function subK(){const d=document.getElementById('kD').value,u=document.getElementById('kU').value,a=+document.getElementById('kA').value||0,p=+document.getElementById('kP').value||0,w=+document.getElementById('kW').value||0,o=+document.getElementById('kO').value||0;if(!d){toast('请选择日期','e');return;}const ex=D.records.find(r=>r.date===d);if(ex){ex.adSpend=a;ex.privateMsg=p;ex.wechatAdd=w;ex.pushOrder=o;ex.kefuUser=u;ex.kefuInputTime=new Date().toLocaleString('zh-CN');}else D.records.push({id:'r_'+Date.now(),date:d,month:d.substring(0,7),adSpend:a,privateMsg:p,wechatAdd:w,pushOrder:o,visitSuccess:0,dealCount:0,kefuUser:u,kefuInputTime:new Date().toLocaleString('zh-CN'),shangmenUser:'',shangmenInputTime:''});save();toast('数据保存成功');}

/* ===== KEFU HISTORY ===== */
function rKH(c){const rs=D.records.filter(r=>r.kefuUser===D.cur).map(calc).sort((a,b)=>b.date.localeCompare(a.date)),tot=agg(rs);c.innerHTML='<div class="page-hd"><h1>我的录入记录</h1><p>查看和管理您录入的客服数据</p></div><div class="card"><div class="table-wrap"><table><thead><tr><th>日期</th><th>月份</th><th>投放消耗</th><th>私信转化</th><th>加微数量</th><th>推单数量</th><th>添加率</th><th>录入时间</th><th>操作</th></tr></thead><tbody>'+(rs.length?rs.map(r=>'<tr><td>'+r.date+'</td><td><span class="tag tag-blue">'+fm(r.month)+'</span></td><td>&yen;'+r.adSpend.toLocaleString()+'</td><td>'+r.privateMsg+'</td><td>'+r.wechatAdd+'</td><td>'+r.pushOrder+'</td><td>'+(r.war*100).toFixed(1)+'%</td><td>'+(r.kefuInputTime||'-')+'</td><td><button class="btn btn-sm btn-danger" onclick="delRec(\''+r.id+'\')">删除</button></td></tr>').join('')+tRow('<td>总计</td><td></td><td>&yen;'+tot.adSpend.toLocaleString()+'</td><td>'+tot.privateMsg+'</td><td>'+tot.wechatAdd+'</td><td>'+tot.pushOrder+'</td><td>'+(tot.war*100).toFixed(1)+'%</td><td></td><td></td>'):'<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:40px">暂无录入记录</td></tr>')+'</tbody></table></div></div>';}

/* ===== KEFU STATS ===== */
function rKS(c){const rs=D.records.filter(r=>r.kefuUser===D.cur),tot=agg(rs),bm={};rs.forEach(r=>{if(!bm[r.month])bm[r.month]=[];bm[r.month].push(r);});const md=Object.keys(bm).sort().map(m=>({...agg(bm[m]),month:m}));c.innerHTML='<div class="page-hd"><h1>我的数据统计</h1><p>您个人数据的统计汇总</p></div><div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)"><div class="kpi-card blue"><div class="kpi-label">总投放消耗</div><div class="kpi-value">&yen;'+tot.adSpend.toLocaleString()+'</div></div><div class="kpi-card green"><div class="kpi-label">总私信转化</div><div class="kpi-value">'+tot.privateMsg+'人</div></div><div class="kpi-card orange"><div class="kpi-label">总加微数量</div><div class="kpi-value">'+tot.wechatAdd+'人</div></div><div class="kpi-card cyan"><div class="kpi-label">平均添加率</div><div class="kpi-value">'+(tot.war*100).toFixed(1)+'%</div></div></div><div class="card"><div class="card-hd"><div class="card-title">我的月度数据</div></div><div class="table-wrap"><table><thead><tr><th>月份</th><th>投放消耗</th><th>私信转化</th><th>加微数量</th><th>推单数量</th><th>添加率</th></tr></thead><tbody>'+md.map(m=>'<tr><td><strong>'+fm(m.month)+'</strong></td><td>&yen;'+m.adSpend.toLocaleString()+'</td><td>'+m.privateMsg+'</td><td>'+m.wechatAdd+'</td><td>'+m.pushOrder+'</td><td>'+(m.war*100).toFixed(1)+'%</td></tr>').join('')+tRow('<td>总计</td><td>&yen;'+tot.adSpend.toLocaleString()+'</td><td>'+tot.privateMsg+'</td><td>'+tot.wechatAdd+'</td><td>'+tot.pushOrder+'</td><td>'+(tot.war*100).toFixed(1)+'%</td>')+'</tbody></table></div></div>';}

/* ===== SM INPUT ===== */
function rSI(c){const opts=D.smStaff.map(n=>'<option value="'+n+'"'+(n===D.cur?' selected':'')+'>'+n+'</option>').join('');c.innerHTML='<div class="page-hd"><h1>录入上门数据</h1><p>请填写当天的上门和成交数据</p></div><div class="card" style="max-width:680px"><div class="form-section"><div class="form-section-title">&#x1F4C5; 基本信息</div><div class="form-grid"><div class="fg"><label>日期</label><input type="date" id="sD" value="'+new Date().toISOString().split('T')[0]+'"></div><div class="fg"><label>负责上门</label><select id="sU">'+opts+'</select></div></div></div><div class="form-section"><div class="form-section-title">&#x1F6AA; 上门数据</div><div class="form-grid"><div class="fg"><label>成功上门（单）</label><input type="number" id="sV" placeholder="0"></div><div class="fg"><label>成交台数（台）</label><input type="number" id="sDl" placeholder="0"></div></div></div><div style="display:flex;gap:12px;margin-top:4px"><button class="btn btn-success" onclick="subS()">&#x1F4BE; 保存数据</button><button class="btn btn-ghost" onclick="document.getElementById(\'sV\').value=\'\';document.getElementById(\'sDl\').value=\'\'">重置</button></div></div>';}
function subS(){const d=document.getElementById('sD').value,u=document.getElementById('sU').value,v=+document.getElementById('sV').value||0,dl=+document.getElementById('sDl').value||0;if(!d){toast('请选择日期','e');return;}const ex=D.records.find(r=>r.date===d);if(ex){ex.visitSuccess=v;ex.dealCount=dl;ex.shangmenUser=u;ex.shangmenInputTime=new Date().toLocaleString('zh-CN');}else D.records.push({id:'r_'+Date.now(),date:d,month:d.substring(0,7),adSpend:0,privateMsg:0,wechatAdd:0,pushOrder:0,visitSuccess:v,dealCount:dl,kefuUser:'',kefuInputTime:'',shangmenUser:u,shangmenInputTime:new Date().toLocaleString('zh-CN')});save();toast('数据保存成功');}

/* ===== SM HISTORY ===== */
function rSH(c){const rs=D.records.filter(r=>r.shangmenUser===D.cur).map(calc).sort((a,b)=>b.date.localeCompare(a.date)),tot=agg(rs);c.innerHTML='<div class="page-hd"><h1>我的录入记录</h1><p>查看和管理您录入的上门数据</p></div><div class="card"><div class="table-wrap"><table><thead><tr><th>日期</th><th>月份</th><th>成功上门</th><th>成交台数</th><th>成交率</th><th>录入时间</th><th>操作</th></tr></thead><tbody>'+(rs.length?rs.map(r=>'<tr><td>'+r.date+'</td><td><span class="tag tag-orange">'+fm(r.month)+'</span></td><td>'+r.visitSuccess+'</td><td><span class="tag tag-green">'+r.dealCount+'</span></td><td>'+(r.vdr*100).toFixed(1)+'%</td><td>'+(r.shangmenInputTime||'-')+'</td><td><button class="btn btn-sm btn-danger" onclick="delRec(\''+r.id+'\')">删除</button></td></tr>').join('')+tRow('<td>总计</td><td></td><td>'+tot.visitSuccess+'</td><td><span class="tag tag-green">'+tot.dealCount+'</span></td><td>'+(tot.vdr*100).toFixed(1)+'%</td><td></td><td></td>'):'<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:40px">暂无录入记录</td></tr>')+'</tbody></table></div></div>';}

/* ===== SM STATS ===== */
function rSS(c){const rs=D.records.filter(r=>r.shangmenUser===D.cur),tot=agg(rs),bm={};rs.forEach(r=>{if(!bm[r.month])bm[r.month]=[];bm[r.month].push(r);});const md=Object.keys(bm).sort().map(m=>({...agg(bm[m]),month:m}));c.innerHTML='<div class="page-hd"><h1>我的数据统计</h1><p>您个人上门数据的统计汇总</p></div><div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)"><div class="kpi-card blue"><div class="kpi-label">总成功上门</div><div class="kpi-value">'+tot.visitSuccess+'单</div></div><div class="kpi-card green"><div class="kpi-label">总成交台数</div><div class="kpi-value">'+tot.dealCount+'台</div></div><div class="kpi-card orange"><div class="kpi-label">平均成交率</div><div class="kpi-value">'+(tot.vdr*100).toFixed(1)+'%</div></div></div><div class="card"><div class="card-hd"><div class="card-title">我的月度数据</div></div><div class="table-wrap"><table><thead><tr><th>月份</th><th>成功上门</th><th>成交台数</th><th>成交率</th></tr></thead><tbody>'+md.map(m=>'<tr><td><strong>'+fm(m.month)+'</strong></td><td>'+m.visitSuccess+'</td><td><span class="tag tag-green">'+m.dealCount+'</span></td><td>'+(m.vdr*100).toFixed(1)+'%</td></tr>').join('')+tRow('<td>总计</td><td>'+tot.visitSuccess+'</td><td><span class="tag tag-green">'+tot.dealCount+'</span></td><td>'+(tot.vdr*100).toFixed(1)+'%</td>')+'</tbody></table></div></div>';}

/* ===== TOAST ===== */
function toast(msg,type){type=type||'s';const t=document.createElement('div');t.className='toast'+(type==='e'?' error':'');t.innerHTML=(type==='e'?'&#x274C; ':'&#x2705; ')+msg;document.getElementById('toastContainer').appendChild(t);setTimeout(()=>t.remove(),3000);}

init();
</script>
